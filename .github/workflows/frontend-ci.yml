name: Job Portal Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      # 📥 Get code
      - name: Checkout code
        uses: actions/checkout@v3

      # 🧠 Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 📦 Install deps
      - name: Install dependencies
        run: npm ci

      # 🔍 Optional: lint check (if eslint configured)
      - name: Run lint
        run: npm run lint --if-present

      # 🏗️ Build project (MAIN TEST)
      - name: Build
        run: npm run build